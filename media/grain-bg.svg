<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" preserveAspectRatio="none">
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="6" result="noise" seed="2"/>
      <feColorMatrix in="noise" type="saturate" values="0.15"/>
      <feBlend in="SourceGraphic" in2="noise" mode="multiply"/>
    </filter>
  </defs>
  <rect width="100" height="100" fill="#0f0d0a" filter="url(#grain)"/>
</svg>