<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sauvage Space — Section</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #cdc9c2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }
    .card {
      background: #f7f4ef;
      padding: 44px 48px 36px;
      max-width: 980px;
      width: 100%;
    }
    .eyebrow {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #8b6f47;
      margin-bottom: 6px;
    }
    .diagram-title {
      font-family: Georgia, serif;
      font-size: 22px;
      font-weight: 300;
      color: #1a1a18;
      margin-bottom: 36px;
      font-style: italic;
      letter-spacing: 0.01em;
    }
    svg { width:100%; height:auto; display:block; }
  </style>
</head>
<body>
<div class="card">
  <p class="eyebrow">Sauvage Space · Potgieterstraat 47H · Amsterdam</p>
  <p class="diagram-title">Cross section — schematic</p>

  <!--
    Key y-coordinates:
      y=20  : top ceiling (entrance room + gallery share same roofline)
      y=210 : gallery floor / kitchen ceiling  (+1.4 m above street)
      y=278 : entrance floor = street level    (± 0)
      y=401 : kitchen floor                    (−2.5 m below street)
      y=418 : cave floor / bottom              (−2.8 m below street)

    Key x-coordinates:
      x=0–104  : street / pavement
      x=104    : building facade
      x=104–460: entrance room (front) + cave (below)
      x=460    : internal dividing wall
      x=460–760: gallery (above) + kitchen (below)
      x=760    : rear wall
  -->
  <svg viewBox="0 0 840 510" xmlns="http://www.w3.org/2000/svg" style="font-family:Georgia,serif;">
    <defs>
      <pattern id="hatch" x="0" y="0" width="7" height="7" patternUnits="userSpaceOnUse">
        <line x1="0" y1="7" x2="7" y2="0" stroke="#b0a090" stroke-width="0.8"/>
      </pattern>
    </defs>

    <!-- ── EARTH ─────────────────────────────────────────────────── -->
    <rect x="0"   y="278" width="104" height="210" fill="url(#hatch)"/>
    <rect x="104" y="448" width="356" height="30"  fill="url(#hatch)" opacity="0.8"/>
    <rect x="0"   y="274" width="104" height="4"   fill="#8a7868"/>

    <!--
      Revised y-coordinates:
        y=20  : ceiling (entrance + gallery share roofline)
        y=210 : gallery floor / kitchen ceiling  (26% above entrance floor = +1.4m)
        y=278 : entrance floor = street level    (± 0)
        y=401 : kitchen floor                    (−2.5m, only ⅓m above cave floor)
        y=418 : cave floor                       (−2.8m)
    -->

    <!-- ── ROOM FILLS ──────────────────────────────────────────────── -->
    <rect x="104" y="20"  width="356" height="258" fill="#eae4dc"/>  <!-- Entrance: y=20–278 -->
    <rect x="104" y="278" width="356" height="140" fill="#d8d1c5"/>  <!-- Cave: y=278–418 -->
    <rect x="460" y="20"  width="300" height="190" fill="#e8e2da"/>  <!-- Gallery: y=20–210 -->
    <rect x="460" y="210" width="300" height="191" fill="#e0d9d0"/>  <!-- Kitchen: y=210–401 -->

    <!-- ── UP STAIRS: Entrance Room → Gallery ──────────────────────
         Rise = 278−210 = 68px. 5 steps × ~14px tall × ~13px wide.
         Within entrance room right side (x=396–460). -->
    <polygon points="396,278 396,264 409,264 409,251 422,251 422,237 435,237 435,224 448,224 448,210 460,210 460,278"
             fill="#d4cdc3"/>
    <polyline points="396,278 396,264 409,264 409,251 422,251 422,237 435,237 435,224 448,224 448,210 460,210"
              fill="none" stroke="#1a1a18" stroke-width="1.3"/>

    <!-- ── DOWN STAIRS: Entrance Room → Kitchen ────────────────────
         Rise = 401−278 = 123px. 7 steps × 17.5px tall × 20px wide.
         Starts at x=460 (entrance wall), runs to x=600 within kitchen. -->
    <polygon points="460,278 480,278 480,296 500,296 500,313 520,313 520,331 540,331 540,348 560,348 560,366 580,366 580,384 600,384 600,401 460,401"
             fill="#cac4ba"/>
    <polyline points="460,278 480,278 480,296 500,296 500,313 520,313 520,331 540,331 540,348 560,348 560,366 580,366 580,384 600,384 600,401"
              fill="none" stroke="#1a1a18" stroke-width="1.3"/>

    <!-- ── ROOM BORDERS ─────────────────────────────────────────────── -->
    <rect x="104" y="20"  width="356" height="258" fill="none" stroke="#1a1a18" stroke-width="2"/>
    <!-- Cave border: top + left + bottom only, right side open (connects to kitchen) -->
    <path d="M460,278 L104,278 L104,418 L460,418" fill="none" stroke="#1a1a18" stroke-width="2"/>
    <rect x="460" y="20"  width="300" height="190" fill="none" stroke="#1a1a18" stroke-width="2"/>
    <rect x="460" y="210" width="300" height="191" fill="none" stroke="#1a1a18" stroke-width="2"/>

    <!-- ── CAVE ACCESS doorway: gap in wall x=460, y=382–401 ──────────
         Near kitchen floor level (y=401), opening into cave. -->
    <rect x="458" y="382" width="4" height="21" fill="#d8d1c5"/>
    <line x1="460" y1="380" x2="460" y2="384" stroke="#1a1a18" stroke-width="2"/>
    <line x1="460" y1="399" x2="460" y2="403" stroke="#1a1a18" stroke-width="2"/>

    <!-- ── GALLERY RAILING ────────────────────────────────────────────
         Wooden slat railing at gallery floor (y=225). -->
    <line x1="460" y1="210" x2="640" y2="210" stroke="#c4976a" stroke-width="3" opacity="0.7"/>
    <line x1="472" y1="210" x2="472" y2="230" stroke="#c4976a" stroke-width="1.5" opacity="0.5"/>
    <line x1="486" y1="210" x2="486" y2="230" stroke="#c4976a" stroke-width="1.5" opacity="0.5"/>
    <line x1="500" y1="210" x2="500" y2="230" stroke="#c4976a" stroke-width="1.5" opacity="0.5"/>
    <line x1="514" y1="210" x2="514" y2="230" stroke="#c4976a" stroke-width="1.5" opacity="0.5"/>
    <line x1="528" y1="210" x2="528" y2="230" stroke="#c4976a" stroke-width="1.5" opacity="0.5"/>

    <!-- ── BAR COUNTER ────────────────────────────────────────────────
         Left portion of Entrance Room, clear of the staircase. -->
    <rect x="128" y="230" width="190" height="26" rx="2" fill="#c4976a" opacity="0.5"/>
    <rect x="128" y="226" width="192" height="5"  rx="1" fill="#a87c52" opacity="0.6"/>
    <line x1="152" y1="256" x2="152" y2="274" stroke="#1a1a18" stroke-width="1.5" opacity="0.3"/>
    <line x1="184" y1="256" x2="184" y2="274" stroke="#1a1a18" stroke-width="1.5" opacity="0.3"/>
    <line x1="216" y1="256" x2="216" y2="274" stroke="#1a1a18" stroke-width="1.5" opacity="0.3"/>
    <circle cx="152" cy="270" r="5" fill="#c4976a" opacity="0.3"/>
    <circle cx="184" cy="270" r="5" fill="#c4976a" opacity="0.3"/>
    <circle cx="216" cy="270" r="5" fill="#c4976a" opacity="0.3"/>

    <!-- ── GLOBE LIGHTS ───────────────────────────────────────────── -->
    <line x1="195" y1="20" x2="195" y2="82" stroke="#1a1a18" stroke-width="1" opacity="0.3"/>
    <circle cx="195" cy="92" r="11" fill="#f5f0e4" stroke="#c4976a" stroke-width="1.2" opacity="0.65"/>
    <line x1="310" y1="20" x2="310" y2="100" stroke="#1a1a18" stroke-width="1" opacity="0.3"/>
    <circle cx="310" cy="110" r="11" fill="#f5f0e4" stroke="#c4976a" stroke-width="1.2" opacity="0.65"/>

    <!-- ── CAVE INTERIOR ──────────────────────────────────────────────

         Exposed wooden ceiling beams -->
    <rect x="118" y="280" width="50" height="6" rx="1" fill="#9a7a50" opacity="0.55"/>
    <rect x="200" y="280" width="50" height="6" rx="1" fill="#9a7a50" opacity="0.55"/>
    <rect x="282" y="280" width="50" height="6" rx="1" fill="#9a7a50" opacity="0.55"/>
    <rect x="364" y="280" width="50" height="6" rx="1" fill="#9a7a50" opacity="0.55"/>

    <!-- String lights along top of shelving -->
    <line x1="118" y1="296" x2="450" y2="296" stroke="#c4976a" stroke-width="0.8" opacity="0.5" stroke-dasharray="2,6"/>

    <!-- Left wine shelving unit (floor-to-near-ceiling cubbies) -->
    <rect x="110" y="298" width="52" height="108" rx="1" fill="#c0b098" opacity="0.4" stroke="#8a7060" stroke-width="1"/>
    <!-- cubby grid lines -->
    <line x1="110" y1="334" x2="162" y2="334" stroke="#8a7060" stroke-width="0.7" opacity="0.5"/>
    <line x1="110" y1="370" x2="162" y2="370" stroke="#8a7060" stroke-width="0.7" opacity="0.5"/>
    <line x1="136" y1="298" x2="136" y2="406" stroke="#8a7060" stroke-width="0.7" opacity="0.5"/>
    <!-- bottle dots in cubbies -->
    <circle cx="123" cy="316" r="4" fill="#5a4a3a" opacity="0.4"/>
    <circle cx="149" cy="316" r="4" fill="#5a4a3a" opacity="0.4"/>
    <circle cx="123" cy="352" r="4" fill="#5a4a3a" opacity="0.4"/>
    <circle cx="149" cy="352" r="4" fill="#5a4a3a" opacity="0.4"/>
    <circle cx="123" cy="388" r="4" fill="#5a4a3a" opacity="0.4"/>
    <circle cx="149" cy="388" r="4" fill="#5a4a3a" opacity="0.4"/>

    <!-- Right wine shelving unit -->
    <rect x="398" y="298" width="52" height="108" rx="1" fill="#c0b098" opacity="0.4" stroke="#8a7060" stroke-width="1"/>
    <line x1="398" y1="334" x2="450" y2="334" stroke="#8a7060" stroke-width="0.7" opacity="0.5"/>
    <line x1="398" y1="370" x2="450" y2="370" stroke="#8a7060" stroke-width="0.7" opacity="0.5"/>
    <line x1="424" y1="298" x2="424" y2="406" stroke="#8a7060" stroke-width="0.7" opacity="0.5"/>
    <circle cx="411" cy="316" r="4" fill="#5a4a3a" opacity="0.4"/>
    <circle cx="437" cy="316" r="4" fill="#5a4a3a" opacity="0.4"/>
    <circle cx="411" cy="352" r="4" fill="#5a4a3a" opacity="0.4"/>
    <circle cx="437" cy="352" r="4" fill="#5a4a3a" opacity="0.4"/>
    <circle cx="411" cy="388" r="4" fill="#5a4a3a" opacity="0.4"/>
    <circle cx="437" cy="388" r="4" fill="#5a4a3a" opacity="0.4"/>

    <!-- Central high tasting table (granite top on black steel base) -->
    <rect x="220" y="330" width="120" height="8"  rx="1" fill="#8a8a84" opacity="0.7"/>  <!-- tabletop -->
    <rect x="232" y="338" width="6"   height="48" rx="1" fill="#4a4a48" opacity="0.6"/>  <!-- leg L -->
    <rect x="322" y="338" width="6"   height="48" rx="1" fill="#4a4a48" opacity="0.6"/>  <!-- leg R -->
    <rect x="226" y="380" width="108" height="8"  rx="1" fill="#3a3a38" opacity="0.5"/>  <!-- plinth -->

    <!-- Bar stools (side view, 3 visible) -->
    <line x1="204" y1="362" x2="204" y2="386" stroke="#c4976a" stroke-width="2" opacity="0.4"/>
    <ellipse cx="204" cy="358" rx="10" ry="4" fill="#c4976a" opacity="0.35"/>
    <line x1="356" y1="362" x2="356" y2="386" stroke="#c4976a" stroke-width="2" opacity="0.4"/>
    <ellipse cx="356" cy="358" rx="10" ry="4" fill="#c4976a" opacity="0.35"/>
    <line x1="280" y1="352" x2="280" y2="374" stroke="#c4976a" stroke-width="2" opacity="0.4"/>
    <ellipse cx="280" cy="348" rx="10" ry="4" fill="#c4976a" opacity="0.35"/>

    <!-- ── KITCHEN COUNTER ────────────────────────────────────────── -->
    <rect x="478" y="355" width="230" height="18" rx="1" fill="#b8b0a8" opacity="0.4"/>
    <rect x="548" y="337" width="80"  height="20" rx="1" fill="#c4bdb6" opacity="0.35"/>

    <!-- ── ARCHED WINDOWS on facade ──────────────────────────────── -->
    <rect x="107" y="108" width="20" height="60" rx="2" fill="#c8d8e0" opacity="0.5"/>
    <path d="M107,108 Q117,93 127,108" fill="#c8d8e0" opacity="0.4"/>
    <rect x="107" y="196" width="20" height="52" rx="2" fill="#c8d8e0" opacity="0.45"/>
    <path d="M107,196 Q117,182 127,196" fill="#c8d8e0" opacity="0.35"/>

    <!-- ── OUTDOOR BENCH ───────────────────────────────────────────── -->
    <rect x="16" y="248" width="66" height="10" rx="2" fill="#c4976a" opacity="0.55"/>
    <line x1="24"  y1="258" x2="24"  y2="272" stroke="#c4976a" stroke-width="2" opacity="0.5"/>
    <line x1="74"  y1="258" x2="74"  y2="272" stroke="#c4976a" stroke-width="2" opacity="0.5"/>

    <!-- ── STREET LEVEL DASHES ─────────────────────────────────────── -->
    <line x1="4" y1="278" x2="104" y2="278" stroke="#8b6f47" stroke-width="1" stroke-dasharray="3,3"/>

    <!-- ── LABELS ──────────────────────────────────────────────────── -->
    <!-- Entrance Room -->
    <rect x="162" y="98" width="216" height="38" rx="4" fill="#eae4dc" opacity="0.88"/>
    <text x="270" y="114" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a18" letter-spacing="0.08em">ENTRANCE ROOM</text>
    <text x="270" y="130" text-anchor="middle" font-size="10" fill="#6b6560">Bar · café · events · street level</text>

    <!-- Cave — label placed above the furniture with a cream backing pill -->
    <rect x="178" y="330" width="184" height="38" rx="4" fill="#d8d1c5" opacity="0.82"/>
    <text x="270" y="346" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a18" letter-spacing="0.08em">CAVE</text>
    <text x="270" y="362" text-anchor="middle" font-size="10" fill="#6b6560">Wine cave · intimate · host-led</text>

    <!-- Gallery — centred in y=20–225 -->
    <rect x="536" y="102" width="148" height="38" rx="4" fill="#e8e2da" opacity="0.88"/>
    <text x="610" y="118" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a18" letter-spacing="0.08em">GALLERY</text>
    <text x="610" y="134" text-anchor="middle" font-size="10" fill="#6b6560">Upstairs · art · events</text>

    <!-- Kitchen — centred in y=210–401 -->
    <rect x="572" y="288" width="186" height="38" rx="4" fill="#e0d9d0" opacity="0.88"/>
    <text x="665" y="304" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a18" letter-spacing="0.08em">KITCHEN</text>
    <text x="665" y="320" text-anchor="middle" font-size="10" fill="#6b6560">Fento BV · professional kitchen</text>

    <!-- Stair labels -->
    <text x="388" y="248" text-anchor="end" font-size="9" fill="#8b6f47">↑ gallery</text>
    <text x="456" y="306" font-size="9" fill="#8b6f47">↓ kitchen</text>

    <!-- Cave access label -->
    <text x="452" y="394" text-anchor="end" font-size="9" fill="#8b6f47">← cave</text>

    <!-- Street / bench labels -->
    <text x="52" y="240" text-anchor="middle" font-size="9" fill="#8b6f47">bench</text>
    <text x="52" y="265" text-anchor="middle" font-size="9" fill="#8a7868" letter-spacing="0.5">STREET</text>
    <text x="4"  y="270" font-size="8" fill="#8b6f47">street level ——</text>

    <!-- ── LEVEL TICK MARKS ───────────────────────────────────────── -->
    <line x1="756" y1="401" x2="764" y2="401" stroke="#8a7868" stroke-width="1"/>
    <text x="768" y="405" font-size="8" fill="#8a7868">−2.5 m</text>
    <line x1="756" y1="225" x2="764" y2="225" stroke="#8a7868" stroke-width="1"/>
    <text x="768" y="229" font-size="8" fill="#8a7868">+1.1 m</text>
    <line x1="756" y1="278" x2="764" y2="278" stroke="#8a7868" stroke-width="1"/>
    <text x="768" y="282" font-size="8" fill="#8a7868">± 0</text>

    <!-- ── ORIENTATION + NOTE ────────────────────────────────────── -->
    <text x="420" y="496" text-anchor="middle" font-size="9"  fill="#8a7868" letter-spacing="0.8">← STREET FRONT &nbsp;·&nbsp; REAR →</text>
    <text x="420" y="482" text-anchor="middle" font-size="8"  fill="#aaa9a0" letter-spacing="0.3">not to scale · schematic only</text>

  </svg>
</div>
</body>
</html>
